<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a1628">
  <title>KIRA Pet Feeder</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/paho-mqtt.min.js"></script>

  <style>
    /* Base Styles */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a1628; color: #e0e8f0; min-height: 100vh; padding-bottom: 24px;
    }

    /* Header & Connection Status */
    .header {
      background: #0d1f35; border-bottom: 1px solid #1e3a5f; padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 22px; font-weight: 700; color: #4a9eff; letter-spacing: 1px; }
    .logo span { color: #8899aa; font-weight: 300; font-size: 14px; margin-left: 4px; }
    .status-container { display: flex; align-items: center; gap: 8px; }
    .conn-dot { width: 9px; height: 9px; border-radius: 50%; background: #ff4444; transition: 0.3s; }
    .conn-dot.on { background: #4eff91; box-shadow: 0 0 8px #4eff91; }
    .conn-label { font-size: 12px; color: #8899aa; }

    /* Layout */
    .main { padding: 16px; max-width: 480px; margin: 0 auto; }
    .card { background: #0d1f35; border: 1px solid #1e3a5f; border-radius: 16px; padding: 18px 20px; margin-bottom: 14px; }
    .card-title { font-size: 11px; text-transform: uppercase; color: #4a9eff; font-weight: 600; margin-bottom: 14px; letter-spacing: 0.05em; }

    /* Bowl Status UI */
    .bowl-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .bowl-card { background: #091525; border: 1px solid #1a3050; border-radius: 12px; padding: 16px; text-align: center; }
    .bowl-icon { font-size: 24px; margin-bottom: 8px; }
    .bowl-name { font-size: 12px; color: #8899aa; margin-bottom: 8px; }
    .bowl-bar-bg { background: #0a1628; border-radius: 6px; height: 8px; overflow: hidden; margin-bottom: 8px; }
    .bowl-bar { height: 100%; border-radius: 6px; background: #4a9eff; transition: width 0.6s ease; width: 0%; }
    .bowl-bar.low { background: #ff6b35; }
    .bowl-bar.high { background: #4eff91; }
    .bowl-pct { font-size: 18px; font-weight: 700; }

    /* Camera UI */
    .cam-wrap { 
      background: #040d1a; border-radius: 12px; min-height: 220px; 
      display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
    }
    #snapshot { width: 100%; display: block; }
    .placeholder { text-align: center; color: #2a4a6a; }
    .placeholder-icon { font-size: 40px; margin-bottom: 8px; }

    /* Control Buttons */
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .btn { 
      padding: 14px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; 
      display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s;
    }
    .btn:active { transform: scale(0.96); }
    .btn-green { background: #0d4030; color: #4eff91; border: 1px solid #1e6040; }
    .btn-orange { background: #3d2000; color: #ffaa00; border: 1px solid #5a3000; }
    .btn-primary { background: #4a9eff; color: #fff; grid-column: 1 / -1; }

    /* System Logs */
    #log { max-height: 150px; overflow-y: auto; font-family: monospace; font-size: 12px; color: #8899aa; }
    .log-item { padding: 4px 0; border-bottom: 1px solid #1a3050; }
    .log-time { color: #4a9eff; margin-right: 8px; }
    .success { color: #4eff91; }
    .alert { color: #ff6b35; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">KIRA <span>Smart Feeder</span></div>
  <div class="status-container">
    <div class="conn-dot" id="conn-dot"></div>
    <div id="conn-label" class="conn-label">Connecting...</div>
  </div>
</div>

<div class="main">
  <div class="card">
    <div class="card-title">Storage Levels</div>
    <div class="bowl-row">
      <div class="bowl-card">
        <div class="bowl-icon">🍖</div>
        <div class="bowl-name">Food</div>
        <div class="bowl-bar-bg"><div class="bowl-bar" id="food-bar"></div></div>
        <div class="bowl-pct" id="food-pct">--</div>
      </div>
      <div class="bowl-card">
        <div class="bowl-icon">💧</div>
        <div class="bowl-name">Water</div>
        <div class="bowl-bar-bg"><div class="bowl-bar" id="water-bar"></div></div>
        <div class="bowl-pct" id="water-pct">--</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Live Vision</div>
    <div class="cam-wrap">
      <img id="snapshot" style="display:none">
      <div id="placeholder" class="placeholder">
        <div class="placeholder-icon">📷</div>
        <p>No snapshot available</p>
      </div>
    </div>
    <button class="btn btn-primary" onclick="sendCmd('SNAPSHOT')">📸 Take Snapshot</button>
  </div>

  <div class="card">
    <div class="card-title">Manual Feed</div>
    <div class="btn-row">
      <button class="btn btn-green" onclick="sendCmd('FEED:NOW')">🍖 Feed Now</button>
      <button class="btn btn-orange" onclick="sendCmd('WATER:NOW')">💧 Water Now</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">System Activity</div>
    <div id="log"></div>
  </div>
</div>

<script>
/** MQTT CONFIGURATION **/
const BROKER = "0b5088bcba2d4f4383816bdfe8ca662a.s1.eu.hivemq.cloud";
const PORT = 8884;
const USER = "NIVARANTECH";
const PASS = "Personal@1";
const CLIENT = "KIRA_WEB_" + Math.random().toString(16).substr(2, 4);

let client = null;
let connected = false;

function connect() {
  if (typeof Paho === 'undefined') {
    logItem("Waiting for MQTT library...", "alert");
    setTimeout(connect, 1000);
    return;
  }

  try {
    // Determine the correct constructor for the loaded library
    const MQTTClient = (typeof Paho.MQTT !== 'undefined') ? Paho.MQTT.Client : Paho.Client;
    
    client = new MQTTClient(BROKER, PORT, "/mqtt", CLIENT);

    client.onConnectionLost = (r) => {
      connected = false;
      updateStatusUI(false, "Disconnected");
      logItem("Connection lost: " + r.errorMessage, "alert");
      setTimeout(connect, 5000);
    };

    client.onMessageArrived = (msg) => {
      handleIncomingData(msg.destinationName, msg.payloadString);
    };

    const options = {
      useSSL: true,
      userName: USER,
      password: PASS,
      onSuccess: () => {
        connected = true;
        updateStatusUI(true, "Connected");
        logItem("Connected to HiveMQ Cloud", "success");
        client.subscribe("kira/sensors");
        client.subscribe("kira/camera/snapshot");
        client.subscribe("kira/status");
      },
      onFailure: (e) => {
        connected = false;
        updateStatusUI(false, "Failed");
        logItem("Login error: " + e.errorMessage, "alert");
        setTimeout(connect, 5000);
      }
    };

    client.connect(options);
  } catch (e) {
    console.error("Initialization error:", e);
  }
}

function handleIncomingData(topic, payload) {
  if (topic === "kira/sensors") {
    try {
      const data = JSON.parse(payload);
      if (data.food !== undefined) updateBowl("food", data.food);
      if (data.water !== undefined) updateBowl("water", data.water);
    } catch(e) { console.error("JSON Parse Error"); }
  } 
  else if (topic === "kira/camera/snapshot") {
    const img = document.getElementById("snapshot");
    img.src = "data:image/jpeg;base64," + payload;
    img.style.display = "block";
    document.getElementById("placeholder").style.display = "none";
    logItem("Snapshot updated");
  }
}

function updateBowl(id, val) {
  const bar = document.getElementById(id + "-bar");
  const pct = document.getElementById(id + "-pct");
  bar.style.width = val + "%";
  pct.innerText = val + "%";
  bar.className = "bowl-bar " + (val < 20 ? "low" : "high");
}

function sendCmd(cmd) {
  if (!connected) return logItem("Not connected", "alert");
  const message = new Paho.Message(cmd);
  message.destinationName = "kira/command";
  client.send(message);
  logItem("Command Sent: " + cmd);
}

function updateStatusUI(isOk, text) {
  document.getElementById("conn-dot").className = "conn-dot" + (isOk ? " on" : "");
  document.getElementById("conn-label").innerText = text;
}

function logItem(msg, type) {
  const log = document.getElementById("log");
  const div = document.createElement("div");
  div.className = "log-item" + (type ? " " + type : "");
  div.innerHTML = `<span class="log-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})}</span> ${msg}`;
  log.insertBefore(div, log.firstChild);
}

// Start connection sequence
window.onload = () => setTimeout(connect, 500);
</script>
</body>
</html>
