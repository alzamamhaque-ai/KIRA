<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a1628">
  <title>KIRA Pet Feeder</title>

  <script src="paho-mqtt.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a1628; color: #e0e8f0; min-height: 100vh; padding-bottom: 24px;
    }
    .header {
      background: #0d1f35; border-bottom: 1px solid #1e3a5f; padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 22px; font-weight: 700; color: #4a9eff; letter-spacing: 1px; }
    .logo span { color: #e0e8f0; font-weight: 300; font-size: 14px; margin-left: 4px; }
    .conn-dot { width: 9px; height: 9px; border-radius: 50%; background: #ff4444; transition: background 0.3s; }
    .conn-dot.on { background: #4eff91; }
    .conn-label { font-size: 12px; color: #8899aa; }
    .main { padding: 16px; max-width: 480px; margin: 0 auto; }
    .card { background: #0d1f35; border: 1px solid #1e3a5f; border-radius: 16px; padding: 18px 20px; margin-bottom: 14px; }
    .card-title { font-size: 11px; text-transform: uppercase; color: #4a9eff; font-weight: 600; margin-bottom: 14px; }
    
    #conn-banner {
      background: #2a0d0d; border: 1px solid #5a1a1a; border-radius: 10px; padding: 12px 16px;
      margin-bottom: 14px; font-size: 13px; color: #ff8888; display: none; align-items: center; gap: 10px;
    }
    #conn-banner.show { display: flex !important; }

    .bowl-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .bowl-card { background: #091525; border: 1px solid #1a3050; border-radius: 12px; padding: 16px; text-align: center; }
    .bowl-bar-bg { background: #0a1628; border-radius: 6px; height: 8px; overflow: hidden; margin-bottom: 8px; }
    .bowl-bar { height: 100%; border-radius: 6px; background: #4a9eff; transition: width 0.6s ease; width: 0%; }
    .bowl-bar.low { background: #ff6b35; }
    .bowl-bar.high { background: #4eff91; }

    .cam-wrap { background: #040d1a; border-radius: 12px; min-height: 200px; display: flex; align-items: center; justify-content: center; position: relative; }
    #snapshot { width: 100%; border-radius: 12px; }
    
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { padding: 14px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-green { background: #0d4030; color: #4eff91; }
    .btn-orange { background: #3d2000; color: #ffaa00; }
    .btn-primary { background: #4a9eff; color: #fff; width: 100%; margin-top: 10px; }

    #log { max-height: 150px; overflow-y: auto; font-size: 12px; color: #8899aa; }
    .log-item { padding: 4px 0; border-bottom: 1px solid #0d1f35; }
    .log-time { color: #4a9eff; font-weight: 600; margin-right: 8px; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">KIRA <span>Smart Feeder</span></div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="conn-dot" id="conn-dot"></div>
    <div id="conn-label" class="conn-label">Connecting...</div>
  </div>
</div>

<div class="main">
  <div id="conn-banner">⚠️ <span id="conn-banner-text">Connecting...</span></div>

  <div class="card">
    <div class="card-title">Bowl Status</div>
    <div class="bowl-row">
      <div class="bowl-card">
        <div>🍖 Food</div>
        <div class="bowl-bar-bg"><div class="bowl-bar" id="food-bar"></div></div>
        <div id="food-pct">--</div>
      </div>
      <div class="bowl-card">
        <div>💧 Water</div>
        <div class="bowl-bar-bg"><div class="bowl-bar" id="water-bar"></div></div>
        <div id="water-pct">--</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Camera</div>
    <div class="cam-wrap">
      <img id="snapshot" style="display:none">
      <div id="placeholder">📷 No snapshot</div>
    </div>
    <button class="btn btn-primary" onclick="sendCmd('SNAPSHOT')">📸 Take Snapshot</button>
  </div>

  <div class="card">
    <div class="card-title">Controls</div>
    <div class="btn-row">
      <button class="btn btn-green" onclick="sendCmd('FEED:NOW')">🍖 Feed</button>
      <button class="btn btn-orange" onclick="sendCmd('WATER:NOW')">💧 Water</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Activity Log</div>
    <div id="log"></div>
  </div>
</div>

<script>
const BROKER = "0b5088bcba2d4f4383816bdfe8ca662a.s1.eu.hivemq.cloud";
const PORT = 8884;
const USER = "NIVARANTECH";
const PASS = "Personal@1";
const CLIENT = "KIRA-Web-" + Math.random().toString(36).substr(2, 5);

let client = null;
let connected = false;

function connect() {
  // Fix: Check for both Paho.MQTT and Paho.Client (fixes your loop)
  if (typeof Paho === 'undefined') {
    logItem("Library not loaded yet...", "alert");
    setTimeout(connect, 1000);
    return;
  }

  try {
    // Fix: Use Paho.Client directly as seen in your F12 console
    const MQTTClient = Paho.Client; 
    client = new MQTTClient(BROKER, PORT, "/mqtt", CLIENT);

    client.onConnectionLost = (r) => {
      connected = false;
      setUI(false, "Disconnected");
      setTimeout(connect, 5000);
    };

    client.onMessageArrived = (msg) => {
      if (msg.destinationName === "kira/sensors") updateUI(JSON.parse(msg.payloadString));
      if (msg.destinationName === "kira/camera/snapshot") showSnap(msg.payloadString);
    };

    client.connect({
      useSSL: true, userName: USER, password: PASS,
      onSuccess: () => {
        connected = true;
        setUI(true, "Connected");
        client.subscribe("kira/sensors");
        client.subscribe("kira/camera/snapshot");
        logItem("Connected to HiveMQ", "success");
      },
      onFailure: (e) => {
        setUI(false, "Login Failed");
        logItem("Error: " + e.errorMessage, "alert");
        setTimeout(connect, 5000);
      }
    });
  } catch(e) { console.error(e); }
}

function sendCmd(cmd) {
  if (!connected) return;
  const msg = new Paho.Message(cmd);
  msg.destinationName = "kira/command";
  client.send(msg);
  logItem("Sent: " + cmd);
}

function updateUI(d) {
  if (d.food !== undefined) {
    document.getElementById("food-bar").style.width = d.food + "%";
    document.getElementById("food-pct").innerText = d.food + "%";
  }
}

function showSnap(b64) {
  document.getElementById("snapshot").src = "data:image/jpeg;base64," + b64;
  document.getElementById("snapshot").style.display = "block";
  document.getElementById("placeholder").style.display = "none";
}

function setUI(ok, txt) {
  document.getElementById("conn-dot").className = "conn-dot" + (ok ? " on" : "");
  document.getElementById("conn-label").innerText = txt;
  document.getElementById("conn-banner").className = ok ? "" : "show";
}

function logItem(m, type) {
  const log = document.getElementById("log");
  const div = document.createElement("div");
  div.className = "log-item " + (type || "");
  div.innerHTML = `<span class="log-time">${new Date().toLocaleTimeString()}</span> ${m}`;
  log.insertBefore(div, log.firstChild);
}

window.onload = () => setTimeout(connect, 500);
</script>
</body>
</html>
