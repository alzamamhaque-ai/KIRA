<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1e">
<title>KIRA — Smart Pet Feeder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
/* ── VARIABLES ─────────────────────────────────────────────────── */
:root {
  --bg:        #0a0f1e;
  --surface:   #111827;
  --surface2:  #1a2236;
  --border:    #1e2d47;
  --accent:    #3b9eff;
  --accent2:   #00e5ff;
  --gold:      #f5c842;
  --danger:    #ff4d6d;
  --success:   #00e676;
  --text:      #e8f0fe;
  --muted:     #6b7ea8;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --radius:    16px;
  --glow:      0 0 30px rgba(59,158,255,0.15);
}

/* ── RESET ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-weight: 400;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── ANIMATED BACKGROUND ────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(59,158,255,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 90%, rgba(0,229,255,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── LAYOUT ─────────────────────────────────────────────────────── */
.app {
  position: relative;
  z-index: 1;
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 0 0 40px;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ─────────────────────────────────────────────────────── */
.header {
  padding: 52px 24px 24px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.brand { display: flex; flex-direction: column; gap: 2px; }
.brand-name {
  font-family: var(--font-head);
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -1px;
  background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.brand-sub {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
}

/* ── CONNECTION STATUS PILL ─────────────────────────────────────── */
.conn-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
  transition: all 0.4s ease;
  cursor: pointer;
  user-select: none;
}
.conn-pill.connected {
  border-color: rgba(0,230,118,0.3);
  background: rgba(0,230,118,0.08);
  color: var(--success);
}
.conn-pill.connecting {
  border-color: rgba(245,200,66,0.3);
  background: rgba(245,200,66,0.08);
  color: var(--gold);
}
.conn-pill.disconnected {
  border-color: rgba(255,77,109,0.3);
  background: rgba(255,77,109,0.08);
  color: var(--danger);
}
.conn-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
.conn-pill.connected .conn-dot { animation: pulse-green 2s infinite; }
.conn-pill.connecting .conn-dot { animation: pulse-gold 1s infinite; }

@keyframes pulse-green {
  0%,100% { box-shadow: 0 0 0 0 rgba(0,230,118,0.4); }
  50%      { box-shadow: 0 0 0 5px rgba(0,230,118,0); }
}
@keyframes pulse-gold {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.3; }
}

/* ── DEVICE CARD ────────────────────────────────────────────────── */
.device-card {
  margin: 8px 24px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.4s;
}
.device-card.device-online { border-color: rgba(59,158,255,0.3); }
.device-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0;
  transition: opacity 0.4s;
}
.device-card.device-online::before { opacity: 1; }

.device-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--surface2), var(--border));
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.device-info { flex: 1; }
.device-name {
  font-family: var(--font-head);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}
.device-meta {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
  display: flex;
  gap: 12px;
}
.device-meta span { display: flex; align-items: center; gap: 4px; }

.device-state {
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 10px;
  border-radius: 6px;
  background: var(--surface2);
  color: var(--muted);
  transition: all 0.3s;
}
.device-state.state-on  { background: rgba(0,230,118,0.12); color: var(--success); }
.device-state.state-blink { background: rgba(59,158,255,0.12); color: var(--accent); animation: state-pulse 1s infinite; }
@keyframes state-pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* ── SECTION LABEL ──────────────────────────────────────────────── */
.section-label {
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 28px 24px 12px;
}

/* ── LED VISUALIZER ─────────────────────────────────────────────── */
.led-visualizer {
  margin: 0 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  position: relative;
  overflow: hidden;
}
.led-orb-wrap {
  position: relative;
  width: 100px; height: 100px;
  display: flex; align-items: center; justify-content: center;
}
.led-orb-glow {
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(59,158,255,0.3), transparent 70%);
  opacity: 0;
  transition: opacity 0.3s;
}
.led-orb-glow.on  { opacity: 1; }
.led-orb-glow.blink { opacity: 1; animation: glow-blink var(--blink-speed, 500ms) infinite; }
@keyframes glow-blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

.led-orb {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px solid var(--border);
  position: relative;
  transition: all 0.3s ease;
  display: flex; align-items: center; justify-content: center;
}
.led-orb.on {
  background: radial-gradient(circle at 35% 35%, #7dd3fc, var(--accent));
  border-color: var(--accent);
  box-shadow: 0 0 20px rgba(59,158,255,0.6), 0 0 60px rgba(59,158,255,0.2);
}
.led-orb.blink {
  animation: orb-blink var(--blink-speed, 500ms) infinite;
}
@keyframes orb-blink {
  0%,100% {
    background: radial-gradient(circle at 35% 35%, #7dd3fc, var(--accent));
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(59,158,255,0.6), 0 0 60px rgba(59,158,255,0.2);
  }
  50% {
    background: var(--surface2);
    border-color: var(--border);
    box-shadow: none;
  }
}
.led-orb-inner {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
}
.led-label {
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--muted);
  text-transform: uppercase;
}

/* ── CONTROL GRID ───────────────────────────────────────────────── */
.control-grid {
  margin: 0 24px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}
.ctrl-btn {
  border: none; outline: none; cursor: pointer;
  border-radius: 12px;
  padding: 16px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-btn:active { transform: scale(0.94); }

.ctrl-btn .btn-icon { font-size: 22px; line-height: 1; }

.btn-on {
  background: rgba(0,230,118,0.1);
  border: 1px solid rgba(0,230,118,0.25);
  color: var(--success);
}
.btn-on:hover { background: rgba(0,230,118,0.18); border-color: rgba(0,230,118,0.5); }

.btn-off {
  background: rgba(255,77,109,0.1);
  border: 1px solid rgba(255,77,109,0.25);
  color: var(--danger);
}
.btn-off:hover { background: rgba(255,77,109,0.18); border-color: rgba(255,77,109,0.5); }

.btn-blink {
  background: rgba(59,158,255,0.1);
  border: 1px solid rgba(59,158,255,0.25);
  color: var(--accent);
}
.btn-blink:hover { background: rgba(59,158,255,0.18); border-color: rgba(59,158,255,0.5); }

.ctrl-btn.active::after {
  content: '';
  position: absolute;
  inset: 0;
  background: currentColor;
  opacity: 0.08;
  border-radius: inherit;
}

/* ── DELAY SLIDER ───────────────────────────────────────────────── */
.slider-card {
  margin: 12px 24px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 20px 24px;
}
.slider-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.slider-title {
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.3px;
}
.slider-value {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.5px;
}
.slider-unit {
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
}

input[type=range] {
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  outline: none;
  -webkit-appearance: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px rgba(59,158,255,0.5);
  cursor: pointer;
  transition: transform 0.15s;
}
input[type=range]::-webkit-slider-thumb:active { transform: scale(1.3); }

.slider-ticks {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}
.slider-ticks span {
  font-size: 10px;
  color: var(--muted);
}

/* ── PING BUTTON ────────────────────────────────────────────────── */
.ping-btn {
  margin: 12px 24px 0;
  width: calc(100% - 48px);
  padding: 16px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  background: transparent;
  color: var(--muted);
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.ping-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(59,158,255,0.05); }
.ping-btn:active { transform: scale(0.98); }

/* ── LOG ────────────────────────────────────────────────────────── */
.log-card {
  margin: 12px 24px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.log-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.log-title {
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
}
.log-clear {
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  transition: all 0.2s;
  font-family: var(--font-body);
}
.log-clear:hover { color: var(--danger); border-color: rgba(255,77,109,0.3); }
.log-body {
  padding: 12px;
  max-height: 180px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.log-body::-webkit-scrollbar { width: 3px; }
.log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.log-entry {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  animation: log-in 0.25s ease;
}
@keyframes log-in {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.log-time {
  font-size: 10px;
  color: var(--muted);
  font-family: monospace;
  flex-shrink: 0;
  padding-top: 1px;
}
.log-msg { font-size: 12px; color: var(--text); opacity: 0.8; }
.log-msg.info  { color: var(--accent); }
.log-msg.success { color: var(--success); }
.log-msg.error { color: var(--danger); }
.log-msg.warn  { color: var(--gold); }

/* ── FOOTER ─────────────────────────────────────────────────────── */
.footer {
  margin-top: auto;
  padding: 24px 24px 0;
  display: flex;
  justify-content: center;
}
.footer-text {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  opacity: 0.5;
}

/* ── TOAST ──────────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 12px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  white-space: nowrap;
  z-index: 100;
  backdrop-filter: blur(10px);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <div class="brand-name">KIRA</div>
      <div class="brand-sub">Smart Pet Feeder</div>
    </div>
    <div class="conn-pill disconnected" id="connPill" onclick="toggleConnect()">
      <div class="conn-dot"></div>
      <span id="connText">Offline</span>
    </div>
  </div>

  <!-- DEVICE CARD -->
  <div class="device-card" id="deviceCard">
    <div class="device-icon">🐱</div>
    <div class="device-info">
      <div class="device-name">KIRA ESP32 Node</div>
      <div class="device-meta">
        <span id="rssiVal">— dBm</span>
        <span id="uptimeVal">— uptime</span>
      </div>
    </div>
    <div class="device-state" id="deviceState">—</div>
  </div>

  <!-- LED SECTION -->
  <div class="section-label">LED Control</div>

  <!-- LED VISUALIZER -->
  <div class="led-visualizer">
    <div class="led-orb-wrap">
      <div class="led-orb-glow" id="ledGlow"></div>
      <div class="led-orb" id="ledOrb">
        <div class="led-orb-inner"></div>
      </div>
    </div>
    <div class="led-label" id="ledLabel">LED OFF</div>
  </div>

  <!-- CONTROLS -->
  <div class="section-label">Commands</div>
  <div class="control-grid">
    <button class="ctrl-btn btn-on"    onclick="sendCmd('on')"    id="btnOn">
      <span class="btn-icon">💡</span>ON
    </button>
    <button class="ctrl-btn btn-off"   onclick="sendCmd('off')"   id="btnOff">
      <span class="btn-icon">🌑</span>OFF
    </button>
    <button class="ctrl-btn btn-blink" onclick="sendCmd('blink')" id="btnBlink">
      <span class="btn-icon">✨</span>BLINK
    </button>
  </div>

  <!-- DELAY SLIDER -->
  <div class="slider-card">
    <div class="slider-header">
      <div class="slider-title">Blink Speed</div>
      <div>
        <span class="slider-value" id="delayVal">500</span>
        <span class="slider-unit"> ms</span>
      </div>
    </div>
    <input type="range" id="delaySlider"
           min="100" max="2000" step="50" value="500"
           oninput="updateDelay(this.value)">
    <div class="slider-ticks">
      <span>Fast 100ms</span>
      <span>1000ms</span>
      <span>Slow 2s</span>
    </div>
  </div>

  <!-- PING -->
  <button class="ping-btn" onclick="sendPing()">⚡ Ping Device</button>

  <!-- LOG -->
  <div class="section-label">Activity Log</div>
  <div class="log-card">
    <div class="log-header">
      <div class="log-title">Events</div>
      <button class="log-clear" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-body" id="logBody">
      <div class="log-entry">
        <span class="log-time">--:--:--</span>
        <span class="log-msg">Waiting for connection...</span>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-text">NivaranTech · KIRA v0.1</div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── MQTT CONFIG ────────────────────────────────────────────────────
const BROKER   = "wss://0b5088bcba2d4f4383816bdfe8ca662a.s1.eu.hivemq.cloud:8884/mqtt";
const MQTT_USER = "NIVARANTECH";
const MQTT_PASS = "Personal@1";
const CLIENT_ID = "KIRA_WebUI_" + Math.random().toString(36).substr(2, 6);

const TOPIC_CMD    = "kira/led/command";
const TOPIC_STATUS = "kira/device/status";
const TOPIC_ALIVE  = "kira/device/alive";

// ── STATE ──────────────────────────────────────────────────────────
let client       = null;
let connected    = false;
let blinkDelay   = 500;
let blinkTimer   = null;
let uiLedState   = false; // local UI blink state
let currentCmd   = 'off';

// ── CONNECT ───────────────────────────────────────────────────────
function connect() {
  setConnState('connecting', 'Connecting...');
  addLog('Connecting to KIRA broker...', 'info');

  const opts = {
    username: MQTT_USER,
    password: MQTT_PASS,
    clientId: CLIENT_ID,
    clean: true,
    reconnectPeriod: 5000,
    connectTimeout: 10000,
  };

  client = mqtt.connect(BROKER, opts);

  client.on('connect', () => {
    connected = true;
    setConnState('connected', 'Online');
    addLog('Connected to HiveMQ broker', 'success');
    client.subscribe(TOPIC_STATUS);
    client.subscribe(TOPIC_ALIVE);
    addLog('Subscribed to device topics', 'info');
    showToast('✅ Connected to KIRA broker');
  });

  client.on('message', (topic, payload) => {
    const msg = payload.toString();
    try {
      const data = JSON.parse(msg);
      handleDeviceMessage(data);
    } catch(e) {
      addLog('Raw: ' + msg, 'info');
    }
  });

  client.on('error', (err) => {
    addLog('Error: ' + err.message, 'error');
  });

  client.on('close', () => {
    connected = false;
    setConnState('disconnected', 'Offline');
    setDeviceOffline();
    addLog('Disconnected from broker', 'warn');
  });

  client.on('reconnect', () => {
    setConnState('connecting', 'Reconnecting...');
    addLog('Reconnecting...', 'warn');
  });
}

function disconnect() {
  if (client) { client.end(); client = null; }
  connected = false;
  setConnState('disconnected', 'Offline');
}

function toggleConnect() {
  if (connected) disconnect();
  else connect();
}

// ── HANDLE DEVICE MESSAGE ─────────────────────────────────────────
function handleDeviceMessage(data) {
  const state = data.state || '';

  // Update device card
  document.getElementById('deviceCard').classList.add('device-online');
  if (data.rssi) document.getElementById('rssiVal').textContent = data.rssi + ' dBm';
  if (data.uptime !== undefined) {
    const u = data.uptime;
    const t = u < 60 ? u + 's' : u < 3600 ? Math.floor(u/60) + 'm' : Math.floor(u/3600) + 'h';
    document.getElementById('uptimeVal').textContent = t + ' uptime';
  }

  // Update device state badge
  const stateEl = document.getElementById('deviceState');
  stateEl.className = 'device-state';
  if (state === 'on' || state === 'pong') {
    stateEl.classList.add('state-on');
    stateEl.textContent = state === 'pong' ? 'PONG ✓' : 'ON';
  } else if (state === 'blinking') {
    stateEl.classList.add('state-blink');
    stateEl.textContent = 'BLINK';
  } else if (state === 'offline') {
    stateEl.textContent = 'OFFLINE';
    setDeviceOffline();
  } else {
    stateEl.textContent = state.toUpperCase() || '—';
  }

  // Update LED visualizer
  updateLEDVisual(state);

  addLog('Device: ' + state + (data.uptime ? ' | up ' + data.uptime + 's' : ''), 'success');

  if (state === 'pong') showToast('🏓 Pong received!');
}

// ── LED VISUAL ────────────────────────────────────────────────────
function updateLEDVisual(state) {
  const orb   = document.getElementById('ledOrb');
  const glow  = document.getElementById('ledGlow');
  const label = document.getElementById('ledLabel');

  // Clear blink timer
  clearInterval(blinkTimer);
  orb.className  = 'led-orb';
  glow.className = 'led-orb-glow';

  if (state === 'on' || state === 'pong') {
    orb.classList.add('on');
    glow.classList.add('on');
    label.textContent = 'LED ON';
    currentCmd = 'on';
  } else if (state === 'blinking') {
    orb.classList.add('blink');
    glow.classList.add('blink');
    orb.style.setProperty('--blink-speed', blinkDelay + 'ms');
    glow.style.setProperty('--blink-speed', blinkDelay + 'ms');
    label.textContent = 'BLINKING · ' + blinkDelay + 'ms';
    currentCmd = 'blink';
  } else if (state === 'off' || state === 'offline') {
    label.textContent = 'LED OFF';
    currentCmd = 'off';
  }

  // Update button active states
  ['btnOn','btnOff','btnBlink'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  if (state === 'on') document.getElementById('btnOn').classList.add('active');
  if (state === 'off') document.getElementById('btnOff').classList.add('active');
  if (state === 'blinking') document.getElementById('btnBlink').classList.add('active');
}

// ── SEND COMMAND ──────────────────────────────────────────────────
function sendCmd(cmd) {
  if (!connected) {
    showToast('⚠️ Not connected — tap the status pill');
    addLog('Cannot send — not connected', 'error');
    return;
  }
  const payload = JSON.stringify({
    cmd: cmd,
    delay: blinkDelay,
    source: 'webui'
  });
  client.publish(TOPIC_CMD, payload);
  addLog('Sent: ' + cmd + (cmd === 'blink' ? ' @' + blinkDelay + 'ms' : ''), 'info');
  showToast('📤 ' + cmd.toUpperCase() + ' sent');
}

function sendPing() {
  if (!connected) { showToast('⚠️ Not connected'); return; }
  client.publish(TOPIC_CMD, JSON.stringify({ cmd: 'ping' }));
  addLog('Ping sent → waiting for pong...', 'info');
  showToast('⚡ Ping sent');
}

// ── DELAY SLIDER ──────────────────────────────────────────────────
function updateDelay(val) {
  blinkDelay = parseInt(val);
  document.getElementById('delayVal').textContent = blinkDelay;
  // If currently blinking, update speed live
  if (currentCmd === 'blink') {
    document.getElementById('ledOrb').style.setProperty('--blink-speed', blinkDelay + 'ms');
    document.getElementById('ledGlow').style.setProperty('--blink-speed', blinkDelay + 'ms');
    document.getElementById('ledLabel').textContent = 'BLINKING · ' + blinkDelay + 'ms';
    if (connected) {
      client.publish(TOPIC_CMD, JSON.stringify({ cmd: 'blink', delay: blinkDelay }));
    }
  }
}

// ── HELPERS ───────────────────────────────────────────────────────
function setConnState(state, text) {
  const pill = document.getElementById('connPill');
  pill.className = 'conn-pill ' + state;
  document.getElementById('connText').textContent = text;
}

function setDeviceOffline() {
  document.getElementById('deviceCard').classList.remove('device-online');
  document.getElementById('deviceState').className = 'device-state';
  document.getElementById('deviceState').textContent = '—';
  updateLEDVisual('off');
}

function addLog(msg, type = '') {
  const body = document.getElementById('logBody');
  const now  = new Date();
  const time = now.toTimeString().substr(0,8);
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-time">${time}</span><span class="log-msg ${type}">${msg}</span>`;
  body.appendChild(entry);
  body.scrollTop = body.scrollHeight;
  // Keep max 50 entries
  while (body.children.length > 50) body.removeChild(body.firstChild);
}

function clearLog() {
  document.getElementById('logBody').innerHTML = '';
  addLog('Log cleared', 'info');
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Auto-connect on load
window.addEventListener('load', () => {
  addLog('KIRA Web UI v0.1 loaded', 'info');
  addLog('Tap the pill to connect', 'info');
  // Auto connect after short delay
  setTimeout(connect, 800);
});
</script>
</body>
</html>
