<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIRA Pet Feeder</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0a1628;
  color: #e0e8f0;
  margin: 0;
}
.header {
  background: #0d1f35;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}
.logo { color: #4a9eff; font-weight: bold; }
.conn-dot { width:10px;height:10px;border-radius:50%;background:red;}
.conn-dot.on { background: #4eff91; }
.main { padding: 20px; }
.card { background:#0d1f35;padding:15px;margin-bottom:10px;border-radius:10px;}
.btn { padding:10px;margin:5px;border:none;border-radius:5px;cursor:pointer;}
.btn-green { background:#0d4030;color:#4eff91;}
.btn-orange { background:#3d2000;color:#ffaa00;}
</style>

<!-- ✅ Load Paho FIRST -->

<script src="https://unpkg.com/paho-mqtt@1.1.0/paho-mqtt.min.js"></script>

</head>

<body>

<div class="header">
  <div class="logo">KIRA</div>
  <div id="conn-dot" class="conn-dot"></div>
</div>

<div class="main">

<div class="card">
  <h3>Status</h3>
  <p id="status">Waiting...</p>
</div>

<div class="card">
  <button class="btn btn-green" onclick="sendCmd('FEED:NOW')">Feed</button>
  <button class="btn btn-orange" onclick="sendCmd('WATER:NOW')">Water</button>
</div>

</div>

<script>

// MQTT CONFIG
const BROKER = "0b5088bcba2d4f4383816bdfe8ca662a.s1.eu.hivemq.cloud";
const PORT   = 8884;
const USER   = "NIVARANTECH";
const PASS   = "Personal@1";
const CLIENT = "KIRA-WebUI-" + Math.random().toString(16).substr(2,8);

const T_CMD    = "kira/command";
const T_STATUS = "kira/status";

let client;
let connected = false;

// CONNECT FUNCTION
function connect() {

  client = new Paho.MQTT.Client(BROKER, PORT, "/mqtt", CLIENT);

  client.onConnectionLost = () => {
    connected = false;
    setConn(false);
    setTimeout(connect, 3000);
  };

  client.onMessageArrived = (msg) => {
    document.getElementById("status").innerText = msg.payloadString;
  };

  client.connect({
    useSSL: true,
    userName: USER,
    password: PASS,

    onSuccess: () => {
      connected = true;
      setConn(true);
      client.subscribe(T_STATUS);
      console.log("MQTT Connected");
    },

    onFailure: (e) => {
      console.error("MQTT FAIL:", e);
      setTimeout(connect, 4000);
    }
  });
}

// SEND COMMAND
function sendCmd(cmd) {
  if (!connected) return;

  let m = new Paho.MQTT.Message(cmd);
  m.destinationName = T_CMD;
  client.send(m);
}

// UI
function setConn(ok) {
  document.getElementById("conn-dot").className = ok ? "conn-dot on" : "conn-dot";
}

// ✅ FIXED START (WAIT FOR PAHO)
window.addEventListener("load", () => {

  const wait = setInterval(() => {
    if (typeof Paho !== "undefined" && Paho.MQTT && Paho.MQTT.Client) {
      clearInterval(wait);
      connect();
    }
  }, 100);

});

</script>

</body>
</html>
